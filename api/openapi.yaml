openapi: 3.0.3
info:
  title: device-cert-issuer API
  version: 1.0.0
  description: Online issuance service for device certificates signed by an Intermediate CA
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: GetHealthz
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /readyz:
    get:
      operationId: GetReadyz
      summary: Readiness probe
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/device-certificates:issue:
    post:
      operationId: PostApiV1DeviceCertificatesIssue
      summary: Issue a device certificate from a CSR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueDeviceCertificateRequest"
      responses:
        "200":
          description: Certificate issued successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueDeviceCertificateResponse"
        "400":
          description: Invalid request or CSR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Enrollment or policy rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    IssueDeviceCertificateRequest:
      type: object
      required:
        - device_id
        - tenant_id
        - model
        - csr_pem
      properties:
        device_id:
          type: string
          minLength: 1
          maxLength: 128
        tenant_id:
          type: string
          minLength: 1
          maxLength: 128
        model:
          type: string
          minLength: 1
          maxLength: 128
        csr_pem:
          type: string
          minLength: 1
          maxLength: 16384
        profile:
          type: string
          maxLength: 64
    IssueDeviceCertificateResponse:
      type: object
      required:
        - device_certificate_pem
        - certificate_chain_pem
        - serial_number
        - not_before
        - not_after
      properties:
        device_certificate_pem:
          type: string
        certificate_chain_pem:
          type: string
        serial_number:
          type: string
        not_before:
          type: string
          format: date-time
        not_after:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        request_id:
          type: string
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    ReadinessResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ready
