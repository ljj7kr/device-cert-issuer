version: "2"
sql:
  - engine: mysql
    schema:
      - db/migration
    queries:
      - db/query
    gen:
      go:
        package: sqlc
        out: internal/gen/sqlc
        sql_package: database/sql
        emit_json_tags: true
        emit_db_tags: true
        emit_interface: false
        overrides:
          - db_type: datetime
            nullable: false
            go_type: time.Time
          - db_type: datetime
            nullable: true
            go_type:
              type: time.Time
              pointer: true
